<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conjecture Checker — WASMTea</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e; color: #eee;
      font-family: system-ui, sans-serif;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    header {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.6rem 1.2rem; background: #16213e;
      border-bottom: 1px solid #0f3460; flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: #e94560; }
    header a   { margin-left: auto; font-size: 0.78rem; color: #555; text-decoration: none; }
    header a:hover { color: #888; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── controls panel ──────────────────────────────────────────────────── */
    #controls {
      width: 300px; flex-shrink: 0;
      background: #16213e; border-right: 1px solid #0f3460;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #controls-scroll { flex: 1; overflow-y: auto; padding: 0.8rem; }

    .sec-title {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #4a9eff;
      padding-bottom: 0.3rem; margin-bottom: 0.5rem;
      border-bottom: 1px solid #0f3460;
    }
    .section { margin-bottom: 1.1rem; }

    .radio-row { display: flex; gap: 1rem; margin-bottom: 0.6rem; }
    .radio-row label { font-size: 0.8rem; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; }

    .field { margin-bottom: 0.45rem; }
    .field label { display: block; font-size: 0.73rem; color: #888; margin-bottom: 0.2rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.3rem 0.5rem;
      background: #0f3460; border: 1px solid #1a4a8a;
      border-radius: 4px; color: #eee; font-size: 0.8rem;
    }
    .field textarea { resize: vertical; min-height: 2.5rem; font-family: monospace; }
    .field input[type=file] { padding: 0.2rem; cursor: pointer; }

    .file-info { font-size: 0.72rem; color: #555; margin-top: 0.2rem; }

    .range-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0.3rem; align-items: end; margin-bottom: 0.3rem;
    }
    .range-row label { font-size: 0.7rem; color: #777; display: block; margin-bottom: 0.15rem; }
    .range-row input {
      width: 100%; padding: 0.25rem 0.3rem;
      background: #0f3460; border: 1px solid #1a4a8a;
      border-radius: 4px; color: #eee; font-size: 0.78rem; text-align: center;
    }
    .range-row .range-name { font-size: 0.73rem; color: #aaa; padding-top: 1.2rem; }

    #gen-count { font-size: 0.7rem; color: #555; margin-top: 0.25rem; }

    /* Metric checkboxes */
    details.metric-group { margin-bottom: 0.3rem; }
    details.metric-group > summary {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: #4a9eff; padding: 0.25rem 0;
      border-bottom: 1px solid #0f3460; cursor: pointer; list-style: none;
      display: flex; justify-content: space-between; align-items: center;
      user-select: none;
    }
    details.metric-group > summary::after {
      content: '▶'; font-size: 0.5rem; color: #4a9eff; transition: transform 0.15s;
    }
    details.metric-group[open] > summary::after { transform: rotate(90deg); }
    details.metric-group > summary::-webkit-details-marker { display: none; }
    .metric-list { padding: 0.2rem 0 0.2rem 0.2rem; }
    .metric-check {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.18rem 0; font-size: 0.75rem; color: #aaa; cursor: pointer;
    }
    .metric-check input { cursor: pointer; accent-color: #4a9eff; }
    .group-ctrl { font-size: 0.65rem; color: #4a9eff; cursor: pointer; margin-left: auto; }
    .group-ctrl:hover { text-decoration: underline; }

    #controls-footer { flex-shrink: 0; padding: 0.7rem 0.8rem; border-top: 1px solid #0f3460; }
    #btn-run {
      width: 100%; padding: 0.5rem; background: #e94560;
      border: none; border-radius: 4px; color: #fff;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    #btn-run:hover    { background: #c73652; }
    #btn-run:disabled { background: #555; cursor: default; }
    #run-status { font-size: 0.72rem; color: #555; margin-top: 0.4rem; text-align: center; }

    /* ── results panel ───────────────────────────────────────────────────── */
    #results {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .results-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 1rem;
      padding: 0.5rem 1rem; background: #16213e;
      border-bottom: 1px solid #0f3460; font-size: 0.78rem; color: #555;
    }
    .results-bar .summary { flex: 1; }
    .results-bar .conjecture-summary { color: #aaa; font-size: 0.73rem; }
    #btn-download {
      padding: 0.25rem 0.75rem; background: #0f3460;
      border: 1px solid #1a4a8a; border-radius: 4px;
      color: #ccc; font-size: 0.78rem; cursor: pointer; transition: background 0.15s;
    }
    #btn-download:hover    { background: #1a4a8a; color: #fff; }
    #btn-download:disabled { opacity: 0.4; cursor: default; }

    .table-wrap {
      flex: 1; overflow: auto; padding: 0.5rem;
    }

    table {
      border-collapse: collapse; font-size: 0.75rem; white-space: nowrap;
    }
    th {
      position: sticky; top: 0; background: #16213e;
      padding: 0.35rem 0.6rem; text-align: left;
      color: #4a9eff; font-weight: 700; font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 2px solid #0f3460; z-index: 1;
    }
    td {
      padding: 0.28rem 0.6rem; border-bottom: 1px solid #0f3460;
      color: #aaa; font-variant-numeric: tabular-nums;
    }
    tr:hover td { background: rgba(74,158,255,0.06); }
    td.g6 { font-family: monospace; font-size: 0.7rem; color: #666; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
    td.val-true  { color: #4caf50; font-weight: 600; }
    td.val-false { color: #e94560; font-weight: 600; }
    td.val-na    { color: #444; font-style: italic; }

    tr.row-pass td:first-child { border-left: 3px solid #4caf50; }
    tr.row-fail td:first-child { border-left: 3px solid #e94560; }
    tr.row-err  td:first-child { border-left: 3px solid #888; }

    .empty-msg { padding: 3rem; text-align: center; color: #444; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>Conjecture Checker</h1>
  <span style="font-size:0.75rem;color:#555">Batch-compute graph metrics · test conjectures</span>
  <a href="graph.html">← Editor</a>
</header>

<div class="main">

  <!-- ── controls ─────────────────────────────────────────────────────────── -->
  <div id="controls">
    <div id="controls-scroll">

      <!-- Graph source -->
      <div class="section">
        <div class="sec-title">Graph Source</div>
        <div class="radio-row">
          <label><input type="radio" name="src" value="file" checked> G6 file</label>
          <label><input type="radio" name="src" value="gen"> Generator sweep</label>
        </div>

        <div id="src-file">
          <div class="field">
            <label>Load .g6 / .graph6 file (one graph per line)</label>
            <input type="file" id="g6-file" accept=".g6,.graph6,.txt">
          </div>
          <div class="file-info" id="file-info">No file loaded.</div>
        </div>

        <div id="src-gen" style="display:none">
          <div class="field">
            <label>Generator</label>
            <select id="gen-select"></select>
          </div>
          <div id="gen-param-ranges"></div>
          <div id="gen-count"></div>
        </div>
      </div>

      <!-- Conjecture expression -->
      <div class="section">
        <div class="sec-title">Conjecture <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.7rem;color:#555">(optional)</span></div>
        <div class="field">
          <textarea id="conjecture" placeholder="e.g. wiener <= n*(n-1)/2&#10;     spectralRadius <= maxDeg&#10;     m1 >= 4*m/n * m"></textarea>
        </div>
        <div style="font-size:0.68rem;color:#444;line-height:1.5">
          JavaScript expression. Variable names = metric IDs below.<br>
          Red rows = counterexamples (false).
        </div>
      </div>

      <!-- Metrics -->
      <div class="section">
        <div class="sec-title">Metrics to compute</div>
        <div id="metrics-list"></div>
      </div>

    </div><!-- /controls-scroll -->

    <div id="controls-footer">
      <button id="btn-run">Run</button>
      <div id="run-status"></div>
    </div>
  </div><!-- /controls -->

  <!-- ── results ──────────────────────────────────────────────────────────── -->
  <div id="results">
    <div class="results-bar">
      <span class="summary" id="result-summary">No results yet.</span>
      <span class="conjecture-summary" id="conj-summary"></span>
      <button id="btn-download" disabled>Download CSV</button>
    </div>
    <div class="table-wrap">
      <div class="empty-msg" id="empty-msg">Run a batch to see results.</div>
      <table id="result-table" style="display:none"><thead></thead><tbody></tbody></table>
    </div>
  </div>

</div><!-- /main -->

<script type="module">
import { CATEGORIES, findGenerator } from './js/generators.js';
import { fromG6 } from './js/io.js';
import { analyzeGraph, evalConjecture, sweepParams, sweepCount } from './js/conjecture.js';

// ── metric catalog ────────────────────────────────────────────────────────────
// Each item: { id, label, fmt(raw) → display string }
// Conjecture expressions use the raw value stored in stats[id].

const METRIC_CATALOG = [
  { group: 'Basic', open: true, items: [
    { id: 'n',          label: 'n (vertices)',       fmt: v => v },
    { id: 'm',          label: 'm (edges)',           fmt: v => v },
    { id: 'density',    label: 'Density',             fmt: v => v.toFixed(4) },
    { id: 'connected',  label: 'Connected',           fmt: v => v ? 'Yes' : 'No' },
    { id: 'components', label: 'Components',          fmt: v => v },
    { id: 'minDeg',     label: 'δ (min degree)',      fmt: v => v },
    { id: 'maxDeg',     label: 'Δ (max degree)',      fmt: v => v },
    { id: 'avgDeg',     label: 'Avg degree',          fmt: v => v.toFixed(4) },
  ]},
  { group: 'Properties', open: true, items: [
    { id: 'bipartite',     label: 'Bipartite',          fmt: v => v ? 'Yes' : 'No' },
    { id: 'isTree',        label: 'Tree',               fmt: v => v ? 'Yes' : 'No' },
    { id: 'isRegular',     label: 'Regular',            fmt: v => v === null ? 'No' : `Yes (k=${v})` },
    { id: 'eulerCircuit',  label: 'Eulerian circuit',   fmt: v => v ? 'Yes' : 'No' },
    { id: 'eulerPath',     label: 'Eulerian path',      fmt: v => v ? 'Yes' : 'No' },
    { id: 'girth',         label: 'Girth',              fmt: v => v == null ? 'N/A' : v === -1 ? '∞' : v },
    { id: 'triangles',     label: 'Triangles',          fmt: v => v },
    { id: 'quadrangles',   label: 'Quadrangles (C₄)',   fmt: v => v == null ? 'N/A' : v },
    { id: 'matchingSize',  label: 'Max matching',       fmt: v => v },
    { id: 'spanningTrees', label: 'Spanning trees',     fmt: v => v == null ? 'N/A' : v },
  ]},
  { group: 'Connectivity', open: false, items: [
    { id: 'diameter',  label: 'Diameter',              fmt: v => v == null ? 'N/A' : v === -1 ? '∞' : v },
    { id: 'radius',    label: 'Radius',                fmt: v => v == null ? 'N/A' : v },
    { id: 'totalEcc',  label: 'Total eccentricity',    fmt: v => v == null ? 'N/A' : v },
    { id: 'avgEcc',    label: 'Avg eccentricity',      fmt: v => v == null ? 'N/A' : v },
    { id: 'eccConn',   label: 'Eccentric connectivity',fmt: v => v == null ? 'N/A' : v },
    { id: 'connEcc',   label: 'Connected eccentricity',fmt: v => v == null ? 'N/A' : v },
  ]},
  { group: 'Degree Indices', open: false, items: [
    { id: 'm1',        label: 'Zagreb M₁',             fmt: v => v },
    { id: 'm2',        label: 'Zagreb M₂',             fmt: v => v },
    { id: 'forgotten', label: 'Forgotten F',           fmt: v => v },
    { id: 'randic',    label: 'Randić',                fmt: v => v },
    { id: 'harmonic',  label: 'Harmonic H',            fmt: v => v },
    { id: 'ga',        label: 'Geometric-Arithmetic',  fmt: v => v },
    { id: 'sumConn',   label: 'Sum Connectivity',      fmt: v => v },
    { id: 'azi',       label: 'Augmented Zagreb',      fmt: v => v },
    { id: 'albertson', label: 'Albertson',             fmt: v => v },
  ]},
  { group: 'Distance Indices', open: false, items: [
    { id: 'wiener',      label: 'Wiener W',            fmt: v => v == null ? 'N/A' : v },
    { id: 'hyperWiener', label: 'Hyper-Wiener WW',     fmt: v => v == null ? 'N/A' : v },
    { id: 'harary',      label: 'Harary H',            fmt: v => v == null ? 'N/A' : v },
    { id: 'avgDist',     label: 'Avg distance',        fmt: v => v == null ? 'N/A' : v },
    { id: 'degDist',     label: 'Degree distance DD',  fmt: v => v == null ? 'N/A' : v },
    { id: 'gutman',      label: 'Gutman index',        fmt: v => v == null ? 'N/A' : v },
    { id: 'mostar',      label: 'Mostar',              fmt: v => v == null ? 'N/A' : v },
    { id: 'szeged',      label: 'Szeged Sz',           fmt: v => v == null ? 'N/A' : v },
    { id: 'piIndex',     label: 'PI index',            fmt: v => v == null ? 'N/A' : v },
  ]},
  { group: 'Spectral (n≤20)', open: false, items: [
    { id: 'spectralRadius', label: 'Spectral radius λ₁', fmt: v => v == null ? 'N/A' : v },
    { id: 'energy',         label: 'Energy',              fmt: v => v == null ? 'N/A' : v },
    { id: 'estrada',        label: 'Estrada index',       fmt: v => v == null ? 'N/A' : v },
    { id: 'fiedler',        label: 'Fiedler value λ₂',   fmt: v => v == null ? 'N/A' : v },
    { id: 'lel',            label: 'Lap. energy (LEL)',   fmt: v => v == null ? 'N/A' : v },
    { id: 'slEnergy',       label: 'SL energy',           fmt: v => v == null ? 'N/A' : v },
  ]},
  { group: 'NP-Hard (n≤25)', open: false, items: [
    { id: 'mis',              label: 'Max independent set', fmt: v => v == null ? 'N/A' : v },
    { id: 'mvc',              label: 'Min vertex cover',    fmt: v => v == null ? 'N/A' : v },
    { id: 'clique',           label: 'Max clique',          fmt: v => v == null ? 'N/A' : v },
    { id: 'chromGreedy',      label: 'Chromatic # (greedy)',fmt: v => v },
    { id: 'hamiltonianCycle', label: 'Hamiltonian cycle',   fmt: v => v == null ? 'N/A' : v ? 'Yes' : 'No' },
    { id: 'hamiltonianPath',  label: 'Hamiltonian path',    fmt: v => v == null ? 'N/A' : v ? 'Yes' : 'No' },
  ]},
];

// ── build metrics UI ──────────────────────────────────────────────────────────
const defaultOn = new Set(['n','m','density','connected','diameter','bipartite',
                           'isRegular','girth','triangles','wiener','spectralRadius']);

const metricsList = document.getElementById('metrics-list');
METRIC_CATALOG.forEach(group => {
  const det = document.createElement('details');
  det.className = 'metric-group';
  if (group.open) det.open = true;

  const sumEl = document.createElement('summary');
  sumEl.innerHTML = `${group.group} <span class="group-ctrl" data-group="${group.group}">all · none</span>`;
  det.appendChild(sumEl);

  const list = document.createElement('div');
  list.className = 'metric-list';
  group.items.forEach(item => {
    const lbl = document.createElement('label');
    lbl.className = 'metric-check';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.name = 'metric'; cb.value = item.id;
    cb.checked = defaultOn.has(item.id);
    lbl.appendChild(cb);
    lbl.append(' ' + item.label);
    list.appendChild(lbl);
  });
  det.appendChild(list);
  metricsList.appendChild(det);
});

// group all/none toggles
metricsList.addEventListener('click', e => {
  const ctrl = e.target.closest('.group-ctrl');
  if (!ctrl) return;
  e.preventDefault(); e.stopPropagation();
  const groupName = ctrl.dataset.group;
  const group = METRIC_CATALOG.find(g => g.group === groupName);
  const ids = new Set(group.items.map(i => i.id));
  const boxes = [...metricsList.querySelectorAll('input[name=metric]')].filter(cb => ids.has(cb.value));
  const anyOff = boxes.some(cb => !cb.checked);
  boxes.forEach(cb => { cb.checked = anyOff; });
});

function selectedMetrics() {
  const checked = [...document.querySelectorAll('input[name=metric]:checked')].map(cb => cb.value);
  const order = METRIC_CATALOG.flatMap(g => g.items.map(i => i.id));
  return order.filter(id => checked.includes(id));
}

function metricFmt(id) {
  for (const g of METRIC_CATALOG) {
    const item = g.items.find(i => i.id === id);
    if (item) return item.fmt;
  }
  return v => String(v);
}
function metricLabel(id) {
  for (const g of METRIC_CATALOG) {
    const item = g.items.find(i => i.id === id);
    if (item) return item.label;
  }
  return id;
}

// ── build generator UI ────────────────────────────────────────────────────────
const genSelect   = document.getElementById('gen-select');
const genParamDiv = document.getElementById('gen-param-ranges');
const genCountDiv = document.getElementById('gen-count');

let currentRanges = {};

CATEGORIES.forEach(cat => {
  const optGrp = document.createElement('optgroup');
  optGrp.label = cat.label;
  cat.generators.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.id; opt.textContent = g.label;
    optGrp.appendChild(opt);
  });
  genSelect.appendChild(optGrp);
});

function rebuildParamRanges() {
  const gen = findGenerator(genSelect.value);
  if (!gen) { genParamDiv.innerHTML = ''; return; }
  currentRanges = {};
  genParamDiv.innerHTML = '';
  gen.params.forEach(p => {
    currentRanges[p.id] = { min: p.min, max: Math.min(p.max, p.default * 2 + 4), step: p.step ?? 1 };
    const row = document.createElement('div');
    row.className = 'range-row';
    row.innerHTML = `
      <div><label>${p.label}</label><span class="range-name" style="font-size:0.73rem;color:#888">${p.label}</span></div>
      <div><label>min</label><input type="number" data-param="${p.id}" data-field="min" value="${currentRanges[p.id].min}" step="${p.step ?? 1}"></div>
      <div><label>max</label><input type="number" data-param="${p.id}" data-field="max" value="${currentRanges[p.id].max}" step="${p.step ?? 1}"></div>
    `;
    genParamDiv.appendChild(row);
  });
  if (gen.params.length === 0) {
    genParamDiv.innerHTML = '<div style="font-size:0.73rem;color:#555;padding:0.2rem 0">Fixed graph (no parameters)</div>';
  }
  updateGenCount(gen);
}

genParamDiv.addEventListener('input', e => {
  const inp = e.target;
  if (!inp.dataset.param) return;
  currentRanges[inp.dataset.param][inp.dataset.field] = parseFloat(inp.value);
  updateGenCount(findGenerator(genSelect.value));
});

function updateGenCount(gen) {
  if (!gen) return;
  const count = gen.params.length === 0 ? 1 : sweepCount(gen.params, currentRanges);
  genCountDiv.textContent = `→ ${count.toLocaleString()} graph${count !== 1 ? 's' : ''}`;
  genCountDiv.style.color = count > 500 ? '#e94560' : '#555';
}

genSelect.addEventListener('change', rebuildParamRanges);
rebuildParamRanges();

// ── source toggle ─────────────────────────────────────────────────────────────
let g6Lines = [];

document.querySelectorAll('input[name=src]').forEach(radio => {
  radio.addEventListener('change', () => {
    const isSrc = radio.value === 'file';
    document.getElementById('src-file').style.display = isSrc ? '' : 'none';
    document.getElementById('src-gen').style.display  = isSrc ? 'none' : '';
  });
});

document.getElementById('g6-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    g6Lines = ev.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l && !l.startsWith('#'));
    document.getElementById('file-info').textContent =
      `${g6Lines.length.toLocaleString()} graphs loaded from "${file.name}"`;
  };
  reader.readAsText(file);
});

// ── main run ──────────────────────────────────────────────────────────────────
const btnRun  = document.getElementById('btn-run');
const statusEl = document.getElementById('run-status');

let lastResults = [];

btnRun.addEventListener('click', async () => {
  const src = document.querySelector('input[name=src]:checked').value;
  const conjectureExpr = document.getElementById('conjecture').value.trim();
  const metrics = selectedMetrics();

  if (metrics.length === 0) { alert('Select at least one metric.'); return; }

  btnRun.disabled = true;
  document.getElementById('result-summary').textContent = 'Running…';
  document.getElementById('conj-summary').textContent = '';
  document.getElementById('btn-download').disabled = true;

  const results = [];
  const CHUNK = 50;

  async function processGraph(n, edges, g6Str) {
    const stats = analyzeGraph(n, edges);
    const conj  = evalConjecture(conjectureExpr, stats);
    results.push({ g6: g6Str, stats, conj });
  }

  const t0 = performance.now();

  if (src === 'file') {
    if (g6Lines.length === 0) {
      alert('No G6 graphs loaded. Please pick a file first.'); btnRun.disabled = false; return;
    }
    for (let i = 0; i < g6Lines.length; i++) {
      try {
        const { n, edges } = fromG6(g6Lines[i]);
        await processGraph(n, edges, g6Lines[i]);
      } catch { /* skip malformed lines */ }
      if ((i+1) % CHUNK === 0) {
        statusEl.textContent = `${i+1} / ${g6Lines.length}`;
        await new Promise(r => setTimeout(r, 0));
      }
    }
  } else {
    const gen = findGenerator(genSelect.value);
    if (!gen) { btnRun.disabled = false; return; }
    let i = 0;
    for (const params of sweepParams(gen.params, currentRanges)) {
      try {
        const { n, edges } = gen.build(params);
        // Express as g6 so each row is identifiable
        const { toG6 } = await import('./js/io.js');
        const g6Str = toG6({ n, edges }).trim();
        await processGraph(n, edges, g6Str);
      } catch { /* skip invalid param combos */ }
      i++;
      if (i % CHUNK === 0) {
        statusEl.textContent = `${i} graphs…`;
        await new Promise(r => setTimeout(r, 0));
      }
    }
  }

  const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
  lastResults = results;
  renderTable(results, metrics, conjectureExpr);
  document.getElementById('result-summary').textContent =
    `${results.length.toLocaleString()} graphs · ${elapsed}s`;

  if (conjectureExpr) {
    const pass  = results.filter(r => r.conj === true).length;
    const fail  = results.filter(r => r.conj === false).length;
    const err   = results.filter(r => r.conj === 'error').length;
    document.getElementById('conj-summary').textContent =
      `✓ ${pass}  ✗ ${fail}${err ? `  ? ${err}` : ''}`;
  }

  statusEl.textContent = '';
  btnRun.disabled = false;
  document.getElementById('btn-download').disabled = false;
});

// ── render table ──────────────────────────────────────────────────────────────
const MAX_ROWS = 1000;

function renderTable(results, metrics, conjectureExpr) {
  const table   = document.getElementById('result-table');
  const emptyEl = document.getElementById('empty-msg');
  const thead   = table.querySelector('thead');
  const tbody   = table.querySelector('tbody');

  thead.innerHTML = '';
  tbody.innerHTML = '';

  if (results.length === 0) {
    table.style.display = 'none';
    emptyEl.textContent = 'No graphs processed.';
    emptyEl.style.display = '';
    return;
  }

  emptyEl.style.display = 'none';
  table.style.display   = '';

  // Header
  const trh = document.createElement('tr');
  if (conjectureExpr) { const th = document.createElement('th'); th.textContent = 'Conj.'; trh.appendChild(th); }
  const thG6 = document.createElement('th'); thG6.textContent = 'G6'; trh.appendChild(thG6);
  metrics.forEach(id => {
    const th = document.createElement('th'); th.textContent = metricLabel(id); trh.appendChild(th);
  });
  thead.appendChild(trh);

  // Rows
  const shown = results.slice(0, MAX_ROWS);
  shown.forEach(r => {
    const tr = document.createElement('tr');
    if      (r.conj === true)    tr.className = 'row-pass';
    else if (r.conj === false)   tr.className = 'row-fail';
    else if (r.conj === 'error') tr.className = 'row-err';

    if (conjectureExpr) {
      const td = document.createElement('td');
      if      (r.conj === true)    { td.textContent = '✓'; td.className = 'val-true'; }
      else if (r.conj === false)   { td.textContent = '✗'; td.className = 'val-false'; }
      else if (r.conj === 'error') { td.textContent = '?'; td.className = 'val-na'; }
      else                          { td.textContent = ''; }
      tr.appendChild(td);
    }

    const tdG6 = document.createElement('td');
    tdG6.textContent = r.g6; tdG6.className = 'g6'; tdG6.title = r.g6;
    tr.appendChild(tdG6);

    metrics.forEach(id => {
      const td = document.createElement('td');
      const raw = r.stats[id];
      const fmt = metricFmt(id);
      td.textContent = raw == null ? 'N/A' : fmt(raw);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  if (results.length > MAX_ROWS) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = metrics.length + (conjectureExpr ? 2 : 1);
    td.style.cssText = 'text-align:center;color:#555;font-style:italic;padding:0.5rem';
    td.textContent = `… ${(results.length - MAX_ROWS).toLocaleString()} more rows in CSV download`;
    tr.appendChild(td); tbody.appendChild(tr);
  }
}

// ── CSV download ──────────────────────────────────────────────────────────────
document.getElementById('btn-download').addEventListener('click', () => {
  if (!lastResults.length) return;
  const metrics = selectedMetrics();
  const conjectureExpr = document.getElementById('conjecture').value.trim();

  const header = [
    ...(conjectureExpr ? ['conjecture'] : []),
    'g6',
    ...metrics.map(metricLabel),
  ];

  const rows = lastResults.map(r => [
    ...(conjectureExpr ? [r.conj === null ? '' : r.conj] : []),
    r.g6,
    ...metrics.map(id => {
      const raw = r.stats[id];
      return raw == null ? '' : metricFmt(id)(raw);
    }),
  ]);

  const csv = [header, ...rows].map(row =>
    row.map(cell => {
      const s = String(cell);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? `"${s.replace(/"/g, '""')}"`
        : s;
    }).join(',')
  ).join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url; a.download = 'conjecture_results.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
