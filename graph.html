<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #e94560; }

    .toolbar { display: flex; gap: 0.4rem; }

    .tool-btn {
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #ccc;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s, color 0.15s;
    }
    .tool-btn:hover  { background: #1a4a8a; color: #fff; }
    .tool-btn.active { background: #e94560; border-color: #e94560; color: #fff; }

    #hint  { margin-left: auto; font-size: 0.75rem; color: #666; }
    #stats { font-size: 0.75rem; color: #555; }

    /* ── main area ─────────────────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      cursor: crosshair;
    }

    /* ── sidebar ───────────────────────────────────────────────────────── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-tabs {
      display: flex;
      flex-shrink: 0;
      border-bottom: 1px solid #0f3460;
    }

    .tab-btn {
      flex: 1;
      padding: 0.55rem 0;
      background: none;
      border: none;
      color: #555;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn:hover  { color: #aaa; }
    .tab-btn.active { color: #4a9eff; border-bottom-color: #4a9eff; }

    .tab-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-panel[hidden] { display: none; }

    /* generate tab */
    #tab-generate { padding: 0.7rem 0.9rem; gap: 0.5rem; overflow-y: auto; }

    .gen-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }

    .gen-item {
      padding: 0.45rem 0.5rem;
      border-radius: 4px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .gen-item:hover  { background: #1a4a8a; color: #fff; }
    .gen-item.active { background: #4a9eff; border-color: #4a9eff; color: #fff; }

    .gen-n-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }
    .gen-n-row label { font-size: 0.78rem; color: #888; flex-shrink: 0; }
    .gen-n-row input {
      width: 60px;
      padding: 0.3rem 0.4rem;
      background: #0f3460;
      border: 1px solid #1a4a8a;
      border-radius: 4px;
      color: #eee;
      font-size: 0.8rem;
      text-align: center;
    }
    #n-note { font-size: 0.7rem; color: #555; margin-top: 0.1rem; }

    #btn-gen {
      width: 100%;
      padding: 0.45rem;
      margin-top: 0.4rem;
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-gen:hover { background: #c73652; }

    /* analyze tab */
    .analyze-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0.5rem 0.9rem;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    #btn-analyze {
      padding: 0.25rem 0.7rem;
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-analyze:hover    { background: #c73652; }
    #btn-analyze:disabled { background: #555; cursor: default; }

    #analysis-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem 0.9rem;
    }

    .section {
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a9eff;
      margin-bottom: 0.4rem;
      padding-bottom: 0.2rem;
      border-bottom: 1px solid #0f3460;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.18rem 0;
      font-size: 0.78rem;
    }

    .row .lbl { color: #888; }
    .row .val { color: #eee; font-variant-numeric: tabular-nums; }
    .val.yes  { color: #4caf50; }
    .val.no   { color: #e94560; }
    .val.na   { color: #666; font-style: italic; }

    .degree-seq {
      font-size: 0.72rem;
      color: #aaa;
      word-break: break-all;
      line-height: 1.6;
      margin-top: 0.15rem;
    }

    #empty-msg {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      margin-top: 2rem;
    }

    details { margin-bottom: 0.6rem; }
    details > summary {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a9eff;
      padding: 0.3rem 0;
      border-bottom: 1px solid #0f3460;
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    details > summary::after {
      content: '▶';
      font-size: 0.55rem;
      color: #4a9eff;
      transition: transform 0.15s;
    }
    details[open] > summary::after { transform: rotate(90deg); }
    details > summary::-webkit-details-marker { display: none; }
    .section-body { padding-top: 0.2rem; }
  </style>
</head>
<body>
  <header>
    <h1>Graph Editor</h1>
    <div class="toolbar">
      <button class="tool-btn active" id="btn-vertex" title="Click canvas to add vertex">Vertex</button>
      <button class="tool-btn" id="btn-edge"   title="Drag from one vertex to another">Edge</button>
      <button class="tool-btn" id="btn-move"   title="Drag vertex to move it">Move</button>
      <button class="tool-btn" id="btn-delete" title="Click vertex or edge to delete">Delete</button>
    </div>
    <span id="stats">0 vertices · 0 edges</span>
    <span id="hint">Click on the canvas to add a vertex</span>
  </header>

  <div class="main">
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>

    <aside id="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="generate">Generate</button>
        <button class="tab-btn"        data-tab="analyze">Analyze</button>
      </div>

      <div id="tab-generate" class="tab-panel">
        <div class="gen-grid">
          <div class="gen-item active" data-kind="complete">Complete</div>
          <div class="gen-item"        data-kind="cycle">Cycle</div>
          <div class="gen-item"        data-kind="path">Path</div>
          <div class="gen-item"        data-kind="star">Star</div>
          <div class="gen-item"        data-kind="wheel">Wheel</div>
          <div class="gen-item"        data-kind="petersen">Petersen</div>
          <div class="gen-item"        data-kind="bipartite">Bipartite</div>
          <div class="gen-item"        data-kind="grid">Grid (n×n)</div>
        </div>
        <div class="gen-n-row">
          <label>n =</label>
          <input type="number" id="gen-n" value="5" min="2" max="20">
        </div>
        <div id="n-note"></div>
        <button id="btn-gen">Generate</button>
      </div>

      <div id="tab-analyze" class="tab-panel" hidden>
        <div class="analyze-head">
          <button id="btn-analyze">Analyze</button>
        </div>
        <div id="analysis-scroll">
          <p id="empty-msg">Build a graph, then click Analyze.</p>
        </div>
      </div>
    </aside>
  </div>

  <script type="module">
    import init, { Graph } from './graph/pkg/graph_editor.js';
    await init();

    // ── canvas setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    // ── state ─────────────────────────────────────────────────────────────────
    const graph = new Graph();
    const R     = Graph.vertex_radius();

    let mode     = 'vertex';
    let edgeDrag = null;
    let moveDrag = null;

    // ── tool buttons ──────────────────────────────────────────────────────────
    const hints = {
      vertex: 'Click empty canvas to add a vertex',
      edge:   'Drag from a vertex to another to add an edge',
      move:   'Drag a vertex to reposition it',
      delete: 'Click a vertex or edge to delete it',
    };

    const hintEl  = document.getElementById('hint');
    const statsEl = document.getElementById('stats');

    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        mode = btn.id.replace('btn-', '');
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        hintEl.textContent = hints[mode];
        canvas.style.cursor = mode === 'vertex' ? 'crosshair'
                            : mode === 'move'   ? 'grab'
                            : 'pointer';
        edgeDrag = moveDrag = null;
        render();
      });
    });

    function updateStats() {
      statsEl.textContent = `${graph.vertex_count()} vertices · ${graph.edge_count()} edges`;
    }

    // ── rendering ─────────────────────────────────────────────────────────────
    const COLORS = {
      vertex:      '#e94560',
      vertexStroke:'#ff6b8a',
      edgeLine:    '#4a9eff',
      edgeDrag:    'rgba(74,158,255,0.5)',
      label:       '#fff',
    };

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const vertices = JSON.parse(graph.vertices_json());
      const edges    = JSON.parse(graph.edges_json());
      const vmap = {};
      vertices.forEach(v => { vmap[v.id] = v; });

      // edges
      ctx.lineWidth = 2; ctx.strokeStyle = COLORS.edgeLine; ctx.lineCap = 'round';
      edges.forEach(e => {
        const a = vmap[e.from], b = vmap[e.to];
        if (!a || !b) return;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      });

      // drag-edge preview
      if (edgeDrag) {
        const src = vmap[edgeDrag.fromId];
        if (src) {
          ctx.lineWidth = 2; ctx.strokeStyle = COLORS.edgeDrag; ctx.setLineDash([6, 4]);
          ctx.beginPath(); ctx.moveTo(src.x, src.y); ctx.lineTo(edgeDrag.curX, edgeDrag.curY); ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      // vertices
      vertices.forEach(v => {
        ctx.beginPath(); ctx.arc(v.x, v.y, R, 0, Math.PI * 2);
        ctx.fillStyle = COLORS.vertex; ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = COLORS.vertexStroke; ctx.stroke();
        ctx.fillStyle = COLORS.label;
        ctx.font = `bold ${R * 0.75}px system-ui`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(v.label, v.x, v.y);
      });
    }

    // ── mouse helpers ─────────────────────────────────────────────────────────
    function canvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function edgeAt(edges, vertices, x, y) {
      const vmap = {};
      vertices.forEach(v => { vmap[v.id] = v; });
      for (const e of edges) {
        const a = vmap[e.from], b = vmap[e.to];
        if (!a || !b) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const len2 = dx * dx + dy * dy;
        if (len2 === 0) continue;
        const t = Math.max(0, Math.min(1, ((x - a.x) * dx + (y - a.y) * dy) / len2));
        const px = a.x + t * dx - x, py = a.y + t * dy - y;
        if (Math.sqrt(px * px + py * py) < 6) return e.id;
      }
      return -1;
    }

    // ── mouse events ──────────────────────────────────────────────────────────
    canvas.addEventListener('mousedown', e => {
      const { x, y } = canvasPos(e);
      const vid = graph.vertex_at(x, y);

      if (mode === 'vertex') {
        if (vid === -1) { graph.add_vertex(x, y); updateStats(); render(); }

      } else if (mode === 'edge') {
        if (vid !== -1) edgeDrag = { fromId: vid, curX: x, curY: y };

      } else if (mode === 'move') {
        if (vid !== -1) {
          const v = JSON.parse(graph.vertices_json()).find(v => v.id === vid);
          moveDrag = { id: vid, offsetX: x - v.x, offsetY: y - v.y };
          canvas.style.cursor = 'grabbing';
        }

      } else if (mode === 'delete') {
        if (vid !== -1) {
          graph.delete_vertex(vid); updateStats(); render();
        } else {
          const verts = JSON.parse(graph.vertices_json());
          const edgs  = JSON.parse(graph.edges_json());
          const eid = edgeAt(edgs, verts, x, y);
          if (eid !== -1) { graph.delete_edge(eid); updateStats(); render(); }
        }
      }
    });

    canvas.addEventListener('mousemove', e => {
      const { x, y } = canvasPos(e);
      if (edgeDrag) { edgeDrag.curX = x; edgeDrag.curY = y; render(); }
      if (moveDrag) { graph.move_vertex(moveDrag.id, x - moveDrag.offsetX, y - moveDrag.offsetY); render(); }
    });

    canvas.addEventListener('mouseup', e => {
      const { x, y } = canvasPos(e);
      if (edgeDrag) {
        const toId = graph.vertex_at(x, y);
        if (toId !== -1 && toId !== edgeDrag.fromId) { graph.add_edge(edgeDrag.fromId, toId); updateStats(); }
        edgeDrag = null; render();
      }
      if (moveDrag) { moveDrag = null; canvas.style.cursor = 'grab'; }
    });

    canvas.addEventListener('mouseleave', () => {
      if (edgeDrag) { edgeDrag = null; render(); }
      if (moveDrag)   moveDrag = null;
    });

    // ── sidebar tabs ──────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.tab;
        document.getElementById('tab-generate').hidden = target !== 'generate';
        document.getElementById('tab-analyze').hidden  = target !== 'analyze';
      });
    });

    // ── graph generators ──────────────────────────────────────────────────────
    const nInput  = document.getElementById('gen-n');
    const nNote   = document.getElementById('n-note');
    const genBtn  = document.getElementById('btn-gen');
    let   genKind = 'complete';

    const nHidden = new Set(['petersen']);
    const nNotes  = {
      bipartite: 'Generates K(n,n)',
      grid:      'Generates an n×n grid',
      star:      'n leaves + 1 centre',
      wheel:     'n rim vertices + 1 hub',
    };

    document.querySelectorAll('.gen-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.gen-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        genKind = item.dataset.kind;
        nInput.parentElement.style.visibility = nHidden.has(genKind) ? 'hidden' : '';
        nNote.textContent = nNotes[genKind] ?? '';
      });
    });

    genBtn.addEventListener('click', () => {
      const n  = Math.max(2, Math.min(20, parseInt(nInput.value) || 5));
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      const r  = Math.min(canvas.width, canvas.height) * 0.38;
      graph.generate(genKind, n, cx, cy, r);
      updateStats();
      render();
    });

    // ── spectral & extended metrics helpers ──────────────────────────────────

    function jacobiEig(M, n) {
      const A = M.map(row => Float64Array.from(row));
      for (let iter = 0; iter < 100 * n * n; iter++) {
        let p = 0, q = 1, maxVal = 0;
        for (let i = 0; i < n; i++)
          for (let j = i + 1; j < n; j++)
            if (Math.abs(A[i][j]) > maxVal) { maxVal = Math.abs(A[i][j]); p = i; q = j; }
        if (maxVal < 1e-10) break;
        const theta = (A[q][q] - A[p][p]) / (2 * A[p][q]);
        const t = Math.sign(theta) / (Math.abs(theta) + Math.sqrt(1 + theta * theta));
        const c = 1 / Math.sqrt(1 + t * t), s = t * c;
        const Apq = A[p][q];
        A[p][p] -= t * Apq; A[q][q] += t * Apq; A[p][q] = A[q][p] = 0;
        for (let r = 0; r < n; r++) {
          if (r === p || r === q) continue;
          const Arp = A[r][p], Arq = A[r][q];
          A[r][p] = A[p][r] = c * Arp - s * Arq;
          A[r][q] = A[q][r] = s * Arp + c * Arq;
        }
      }
      return Array.from({length: n}, (_, i) => A[i][i]);
    }

    function hamCycle(start, n, amat) {
      const vis = new Uint8Array(n); vis[start] = 1;
      function bt(v, d) {
        if (d === n) return amat[v][start] === 1;
        for (let u = 0; u < n; u++)
          if (!vis[u] && amat[v][u]) { vis[u] = 1; if (bt(u, d + 1)) return true; vis[u] = 0; }
        return false;
      }
      return bt(start, 1);
    }

    function hamPath(n, amat) {
      const vis = new Uint8Array(n);
      function bt(v, d) {
        if (d === n) return true;
        for (let u = 0; u < n; u++)
          if (!vis[u] && amat[v][u]) { vis[u] = 1; if (bt(u, d + 1)) return true; vis[u] = 0; }
        return false;
      }
      for (let s = 0; s < n; s++) { vis.fill(0); vis[s] = 1; if (bt(s, 1)) return true; }
      return false;
    }

    function augmentMatch(v, adj, match, vis) {
      for (const u of adj[v]) {
        if (vis[u]) continue; vis[u] = 1;
        if (match[u] === -1 || augmentMatch(match[u], adj, match, vis)) {
          match[v] = u; match[u] = v; return true;
        }
      }
      return false;
    }

    function computeExtendedMetrics(n, adj, base) {
      const degrees = adj.map(a => a.length);
      const m = base.edge_count;
      const isConnected = base.is_connected;
      const maxDeg = n > 0 ? Math.max(...degrees) : 0;

      const amat = Array.from({length: n}, (_, i) => {
        const row = new Uint8Array(n);
        adj[i].forEach(j => { row[j] = 1; });
        return row;
      });

      const isTree    = isConnected && m === n - 1;
      const isRegular = n > 0 && degrees.every(d => d === degrees[0]);

      // Bipartite check (for chromatic index via Vizing / König)
      const colorB = new Int8Array(n).fill(-1);
      let isBip = true;
      bip: for (let s = 0; s < n; s++) {
        if (colorB[s] !== -1) continue;
        colorB[s] = 0;
        const bq = [s];
        for (let h = 0; h < bq.length; h++) {
          const v = bq[h];
          for (const u of adj[v]) {
            if (colorB[u] === -1) { colorB[u] = 1 - colorB[v]; bq.push(u); }
            else if (colorB[u] === colorB[v]) { isBip = false; break bip; }
          }
        }
      }
      const chromaticIndex = isBip ? String(maxDeg) : `${maxDeg}–${maxDeg + 1}`;

      // Degree-based indices
      let m1 = 0, m2 = 0, randic = 0, harmonic = 0, albertson = 0;
      let forgotten = 0, ga = 0, sumConn = 0, azi = 0;
      for (let i = 0; i < n; i++) {
        m1       += degrees[i] ** 2;
        forgotten += degrees[i] ** 3;
        for (const j of adj[i]) if (j > i) {
          const di = degrees[i], dj = degrees[j], s2 = di + dj;
          m2        += di * dj;
          randic    += di && dj ? 1 / Math.sqrt(di * dj) : 0;
          harmonic  += 2 / (s2 || 1);
          albertson += Math.abs(di - dj);
          ga        += s2 > 0 ? 2 * Math.sqrt(di * dj) / s2 : 0;
          sumConn   += s2 > 0 ? 1 / Math.sqrt(s2) : 0;
          if (s2 > 2) azi += ((di * dj) / (s2 - 2)) ** 3;
        }
      }

      // Triangles
      let triangles = 0;
      for (let i = 0; i < n; i++)
        for (const j of adj[i]) if (j > i)
          for (const k of adj[j]) if (k > j && amat[i][k]) triangles++;

      // Quadrangles (C4), n ≤ 100
      let quadrangles = null;
      if (n <= 100) {
        const p2 = Array.from({length: n}, () => new Int32Array(n));
        for (let w = 0; w < n; w++)
          for (let ai = 0; ai < adj[w].length; ai++)
            for (let bi = ai + 1; bi < adj[w].length; bi++) {
              const u = adj[w][ai], v = adj[w][bi];
              p2[Math.min(u, v)][Math.max(u, v)]++;
            }
        quadrangles = 0;
        for (let i = 0; i < n; i++)
          for (let j = i + 1; j < n; j++) {
            const c = p2[i][j]; if (c >= 2) quadrangles += c * (c - 1) / 2;
          }
      }

      // Girth, n ≤ 200
      let girth = null;
      if (n <= 200) {
        let g = Infinity;
        for (let s = 0; s < n && g > 3; s++) {
          const d = new Int32Array(n).fill(-1), par = new Int32Array(n).fill(-1);
          d[s] = 0;
          const q = [s];
          for (let h = 0; h < q.length; h++) {
            const v = q[h];
            for (const u of adj[v]) {
              if (d[u] === -1) { d[u] = d[v] + 1; par[u] = v; q.push(u); }
              else if (par[v] !== u) { const c = d[v] + d[u] + 1; if (c < g) g = c; }
            }
          }
        }
        girth = isFinite(g) ? g : -1;
      }

      // All-pairs BFS, n ≤ 300
      let distMatrix = null;
      if (isConnected && n <= 300) {
        distMatrix = [];
        for (let s = 0; s < n; s++) {
          const d = new Int32Array(n).fill(-1); d[s] = 0;
          const q = [s];
          for (let h = 0; h < q.length; h++) {
            const v = q[h];
            for (const u of adj[v]) if (d[u] === -1) { d[u] = d[v] + 1; q.push(u); }
          }
          distMatrix.push(d);
        }
      }

      let wiener = null, harary = null, hyperWiener = null, avgDist = null;
      let degDist = null, gutman = null, radius = null;
      let mostar = null, szeged = null, piIndex = null;
      let totalEcc = null, avgEcc = null, eccConn = null, connEcc = null;

      if (distMatrix) {
        wiener = 0; harary = 0; hyperWiener = 0; degDist = 0; gutman = 0;
        const eccs = distMatrix.map(d => Math.max(...d));
        radius   = Math.min(...eccs);
        totalEcc = eccs.reduce((s, e) => s + e, 0);
        avgEcc   = +(totalEcc / n).toFixed(4);
        eccConn  = eccs.reduce((s, e, i) => s + degrees[i] * e, 0);
        connEcc  = +eccs.reduce((s, e, i) => s + (e > 0 ? degrees[i] / e : 0), 0).toFixed(4);
        for (let i = 0; i < n; i++)
          for (let j = i + 1; j < n; j++) {
            const d = distMatrix[i][j];
            wiener      += d;
            harary      += 1 / d;
            hyperWiener += d + d * d;
            degDist     += (degrees[i] + degrees[j]) * d;
            gutman      += degrees[i] * degrees[j] * d;
          }
        harary  = +harary.toFixed(4);
        avgDist = n > 1 ? +(wiener / (n * (n - 1) / 2)).toFixed(4) : 0;
        if (n <= 100) {
          szeged = 0; piIndex = 0; mostar = 0;
          for (let u = 0; u < n; u++)
            for (const v of adj[u]) if (v > u) {
              let nu = 0, nv = 0;
              for (let w = 0; w < n; w++) {
                if (distMatrix[u][w] < distMatrix[v][w]) nu++;
                else if (distMatrix[v][w] < distMatrix[u][w]) nv++;
              }
              szeged  += nu * nv;
              piIndex += nu + nv;
              mostar  += Math.abs(nu - nv);
            }
        }
      }

      // Spectral (Jacobi), n ≤ 20
      let adjSpectrum = null, energy = null, spectralRadius = null, estrada = null;
      let lapSpectrum = null, fiedler = null, lel = null, spanningTrees = null;
      let slSpectrum = null, slEnergy = null;
      if (n <= 20 && n > 0) {
        const Amat = Array.from({length: n}, (_, i) => {
          const row = new Float64Array(n); adj[i].forEach(j => { row[j] = 1; }); return row;
        });
        const eigA = jacobiEig(Amat, n).sort((a, b) => b - a);
        adjSpectrum    = eigA.map(e => +e.toFixed(4));
        energy         = +eigA.reduce((s, e) => s + Math.abs(e), 0).toFixed(4);
        spectralRadius = +Math.max(...eigA.map(Math.abs)).toFixed(4);
        estrada        = +eigA.reduce((s, e) => s + Math.exp(e), 0).toFixed(4);

        const Lmat = Array.from({length: n}, (_, i) => {
          const row = new Float64Array(n); row[i] = degrees[i]; adj[i].forEach(j => { row[j] = -1; }); return row;
        });
        const eigL = jacobiEig(Lmat, n).map(e => Math.max(0, e)).sort((a, b) => a - b);
        lapSpectrum = eigL.map(e => +e.toFixed(4));
        fiedler = lapSpectrum[1] ?? 0;
        const avgD = n > 0 ? 2 * m / n : 0;
        lel = +eigL.reduce((s, e) => s + Math.abs(e - avgD), 0).toFixed(4);
        if (isConnected) {
          const nz = eigL.filter(e => e > 0.1);
          if (nz.length === n - 1) spanningTrees = Math.round(nz.reduce((p, e) => p * e, 1) / n);
        }

        const Qmat = Array.from({length: n}, (_, i) => {
          const row = new Float64Array(n); row[i] = degrees[i]; adj[i].forEach(j => { row[j] = 1; }); return row;
        });
        const eigQ = jacobiEig(Qmat, n).sort((a, b) => b - a);
        slSpectrum = eigQ.map(e => +e.toFixed(4));
        slEnergy   = +eigQ.reduce((s, e) => s + Math.abs(e), 0).toFixed(4);
      }

      // Max matching
      const match = new Int32Array(n).fill(-1);
      let matchingSize = 0;
      for (let v = 0; v < n; v++) {
        if (match[v] === -1) {
          const vis = new Uint8Array(n); vis[v] = 1;
          if (augmentMatch(v, adj, match, vis)) matchingSize++;
        }
      }

      // Hamiltonian (n ≤ 15)
      let hamiltonianCycle = null, hamiltonianPath = null;
      if (n >= 3 && n <= 15) {
        hamiltonianCycle = hamCycle(0, n, amat);
        hamiltonianPath  = hamiltonianCycle || hamPath(n, amat);
      }

      // Prüfer sequence (tree, 3 ≤ n ≤ 30)
      let pruferSeq = null;
      if (isTree && n >= 3 && n <= 30) {
        const deg2 = [...degrees]; pruferSeq = [];
        const removed = new Uint8Array(n);
        for (let step = 0; step < n - 2; step++) {
          let leaf = -1;
          for (let i = 0; i < n; i++) if (!removed[i] && deg2[i] === 1) { leaf = i; break; }
          if (leaf === -1) break;
          const nb = adj[leaf].find(u => !removed[u]);
          if (nb === undefined) break;
          pruferSeq.push(nb); removed[leaf] = 1; deg2[nb]--;
        }
      }

      return {
        isTree, isRegular, regularDeg: isRegular ? degrees[0] : null,
        triangles, quadrangles, girth, pruferSeq, spanningTrees,
        m1, m2, forgotten,
        randic: +randic.toFixed(4), harmonic: +harmonic.toFixed(4), albertson,
        ga: +ga.toFixed(4), sumConn: +sumConn.toFixed(4), azi: +azi.toFixed(4),
        chromaticIndex,
        wiener, harary, hyperWiener, avgDist, degDist, gutman,
        mostar, szeged, piIndex,
        radius, totalEcc, avgEcc, eccConn, connEcc,
        adjSpectrum, energy, spectralRadius, estrada,
        lapSpectrum, fiedler, lel, slSpectrum, slEnergy,
        matchingSize, hamiltonianCycle, hamiltonianPath,
        distComputed: distMatrix !== null,
      };
    }

    // ── analysis sidebar ──────────────────────────────────────────────────────
    const analyzeBtn  = document.getElementById('btn-analyze');
    const scrollEl    = document.getElementById('analysis-scroll');

    function bool(v) {
      return v ? '<span class="val yes">Yes</span>' : '<span class="val no">No</span>';
    }
    function naV(ok, val) {
      return ok ? `<span class="val">${val}</span>` : '<span class="val na">N/A</span>';
    }
    function row(label, valueHtml) {
      return `<div class="row"><span class="lbl">${label}</span>${valueHtml}</div>`;
    }

    function runAnalysis() {
      if (graph.vertex_count() === 0) {
        scrollEl.innerHTML = '<p id="empty-msg">Build a graph, then click Analyze.</p>';
        return;
      }
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = '...';

      setTimeout(() => {
        const a = JSON.parse(graph.analyze());

        // Build 0-indexed adjacency list for extended metrics
        const vertices = JSON.parse(graph.vertices_json());
        const edges    = JSON.parse(graph.edges_json());
        const n = vertices.length;
        const idxOf = new Map();
        vertices.forEach((v, i) => idxOf.set(v.id, i));
        const adj = Array.from({length: n}, () => []);
        edges.forEach(e => {
          const i = idxOf.get(e.from), j = idxOf.get(e.to);
          if (i !== undefined && j !== undefined) { adj[i].push(j); adj[j].push(i); }
        });

        const ext = computeExtendedMetrics(n, adj, a);

        const diamStr = a.diameter === -1
          ? '<span class="val na">∞ (disconnected)</span>'
          : `<span class="val">${a.diameter}</span>`;

        const exactNote = a.exact_computed ? '' :
          '<div class="row"><span class="lbl" style="color:#e94560;font-size:0.7rem">n &gt; 25 — NP-hard skipped</span></div>';

        scrollEl.innerHTML = `
          <details open>
            <summary>Basic</summary>
            <div class="section-body">
              ${row('Vertices', `<span class="val">${a.vertex_count}</span>`)}
              ${row('Edges',    `<span class="val">${a.edge_count}</span>`)}
              ${row('Density',  `<span class="val">${(a.density * 100).toFixed(1)}%</span>`)}
              ${row('Is tree',  bool(ext.isTree))}
              ${row('Regular',  ext.isRegular ? `<span class="val yes">Yes (k=${ext.regularDeg})</span>` : '<span class="val no">No</span>')}
              ${ext.spanningTrees !== null ? row('Spanning trees', `<span class="val">${ext.spanningTrees}</span>`) : ''}
              ${row('Triangles', `<span class="val">${ext.triangles}</span>`)}
              ${ext.quadrangles !== null ? row('Quadrangles (C₄)', `<span class="val">${ext.quadrangles}</span>`) : ''}
              ${ext.girth !== null ? row('Girth', ext.girth === -1 ? '<span class="val na">∞ (acyclic)</span>' : `<span class="val">${ext.girth}</span>`) : ''}
              ${ext.pruferSeq ? row('Prüfer seq.', `<span class="val" style="font-size:0.72rem">[${ext.pruferSeq.join(', ')}]</span>`) : ''}
            </div>
          </details>

          <details open>
            <summary>Connectivity</summary>
            <div class="section-body">
              ${row('Connected',  bool(a.is_connected))}
              ${row('Components', `<span class="val">${a.connected_components}</span>`)}
              ${row('Diameter',   diamStr)}
              ${ext.radius !== null ? row('Radius', `<span class="val">${ext.radius}</span>`) : ''}
            </div>
          </details>

          <details open>
            <summary>Degrees</summary>
            <div class="section-body">
              ${row('Min', `<span class="val">${a.min_degree}</span>`)}
              ${row('Max', `<span class="val">${a.max_degree}</span>`)}
              ${row('Avg', `<span class="val">${a.avg_degree.toFixed(2)}</span>`)}
              <div class="degree-seq">(${a.degree_sequence.join(', ')})</div>
            </div>
          </details>

          <details open>
            <summary>Properties</summary>
            <div class="section-body">
              ${row('Bipartite',        bool(a.is_bipartite))}
              ${row('Eulerian circuit', bool(a.has_eulerian_circuit))}
              ${row('Eulerian path',    bool(a.has_eulerian_path))}
            </div>
          </details>

          <details>
            <summary>Degree Indices</summary>
            <div class="section-body">
              ${row('Zagreb M₁',   `<span class="val">${ext.m1}</span>`)}
              ${row('Zagreb M₂',   `<span class="val">${ext.m2}</span>`)}
              ${row('Forgotten F', `<span class="val">${ext.forgotten}</span>`)}
              ${row('Randić',      `<span class="val">${ext.randic}</span>`)}
              ${row('Harmonic',    `<span class="val">${ext.harmonic}</span>`)}
              ${row('Geo.-Arith.', `<span class="val">${ext.ga}</span>`)}
              ${row('Sum Conn.',   `<span class="val">${ext.sumConn}</span>`)}
              ${row('Aug. Zagreb', `<span class="val">${ext.azi}</span>`)}
              ${row('Albertson',   `<span class="val">${ext.albertson}</span>`)}
            </div>
          </details>

          <details>
            <summary>Distance Indices</summary>
            <div class="section-body">
              ${ext.distComputed ? `
                ${row('Wiener',         `<span class="val">${ext.wiener}</span>`)}
                ${row('Hyper-Wiener',   `<span class="val">${ext.hyperWiener}</span>`)}
                ${row('Avg. distance',  `<span class="val">${ext.avgDist}</span>`)}
                ${row('Harary',         `<span class="val">${ext.harary}</span>`)}
                ${row('Deg. Distance',  `<span class="val">${ext.degDist}</span>`)}
                ${row('Gutman',         `<span class="val">${ext.gutman}</span>`)}
                ${ext.mostar  !== null ? row('Mostar',  `<span class="val">${ext.mostar}</span>`)  : ''}
                ${ext.szeged  !== null ? row('Szeged',  `<span class="val">${ext.szeged}</span>`)  : ''}
                ${ext.piIndex !== null ? row('PI',      `<span class="val">${ext.piIndex}</span>`) : ''}
              ` : '<div class="row"><span class="lbl" style="color:#666;font-style:italic">N/A (disconnected)</span></div>'}
            </div>
          </details>

          <details>
            <summary>Eccentricity Indices</summary>
            <div class="section-body">
              ${ext.totalEcc !== null ? `
                ${row('Total eccentricity', `<span class="val">${ext.totalEcc}</span>`)}
                ${row('Avg. eccentricity',  `<span class="val">${ext.avgEcc}</span>`)}
                ${row('Eccentric conn.',    `<span class="val">${ext.eccConn}</span>`)}
                ${row('Conn. eccentric',    `<span class="val">${ext.connEcc}</span>`)}
              ` : '<div class="row"><span class="lbl" style="color:#666;font-style:italic">N/A (disconnected)</span></div>'}
            </div>
          </details>

          <details>
            <summary>Spectral <small style="color:#555;text-transform:none;font-weight:400;letter-spacing:0">(n≤20)</small></summary>
            <div class="section-body">
              ${ext.adjSpectrum ? `
                ${row('Spectral radius',    `<span class="val">${ext.spectralRadius}</span>`)}
                ${row('Energy',             `<span class="val">${ext.energy}</span>`)}
                ${row('Estrada index',      `<span class="val">${ext.estrada}</span>`)}
                <div class="degree-seq">λ: [${ext.adjSpectrum.join(', ')}]</div>
                ${row('Fiedler value',      `<span class="val">${ext.fiedler}</span>`)}
                ${row('Lap. energy (LEL)',  `<span class="val">${ext.lel}</span>`)}
                <div class="degree-seq">μ: [${ext.lapSpectrum.join(', ')}]</div>
                ${row('SL energy',          `<span class="val">${ext.slEnergy}</span>`)}
                <div class="degree-seq">q: [${ext.slSpectrum.join(', ')}]</div>
              ` : '<div class="row"><span class="val na">N/A (n &gt; 20)</span></div>'}
            </div>
          </details>

          <details>
            <summary>Matching &amp; Coloring</summary>
            <div class="section-body">
              ${row('Max matching',         `<span class="val">${ext.matchingSize}</span>`)}
              ${row('Chromatic # (greedy)', `<span class="val">${a.chromatic_number_greedy}</span>`)}
              ${row('Chromatic index',      `<span class="val">${ext.chromaticIndex}</span>`)}
            </div>
          </details>

          <details open>
            <summary>NP-Hard <small style="color:#555;text-transform:none;font-weight:400;letter-spacing:0">(n≤25/15)</small></summary>
            <div class="section-body">
              ${exactNote}
              ${row('Max independent set', naV(a.exact_computed, a.max_independent_set))}
              ${row('Min vertex cover',    naV(a.exact_computed, a.min_vertex_cover))}
              ${row('Max clique',          naV(a.exact_computed, a.max_clique))}
              ${ext.hamiltonianCycle !== null
                ? row('Hamiltonian cycle', bool(ext.hamiltonianCycle))
                : row('Hamiltonian cycle', '<span class="val na">N/A (n &gt; 15)</span>')}
              ${ext.hamiltonianPath !== null
                ? row('Hamiltonian path', bool(ext.hamiltonianPath))
                : row('Hamiltonian path', '<span class="val na">N/A (n &gt; 15)</span>')}
            </div>
          </details>
        `;

        analyzeBtn.disabled = false;
        analyzeBtn.textContent = 'Analyze';
      }, 10);
    }

    analyzeBtn.addEventListener('click', runAnalysis);

    // ── resize ────────────────────────────────────────────────────────────────
    const wrap = canvas.parentElement;
    function resize() {
      canvas.width  = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
      render();
    }
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
